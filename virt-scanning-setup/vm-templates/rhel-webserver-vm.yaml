apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: rhel-webserver
  namespace: default
  labels:
    app: rhel-webserver
spec:
  runStrategy: Always  
  template:
    metadata:
      labels:
        kubevirt.io/domain: rhel-webserver
        kubevirt.io/size: small
    spec:
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        devices:
          autoattachVSOCK: true
          disks:
            - bootOrder: 1
              disk:
                bus: virtio
              name: rootdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            - masquerade: {}
              model: virtio
              name: default
          rng: {}
        features:
          acpi: {}
          smm:
            enabled: true
        firmware:
          bootloader:
            efi: {}
        machine:
          type: pc-q35-rhel9.6.0   # Matches RHEL 9/10 compat
        memory:
          guest: 2Gi
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 180
      volumes:
        - dataVolume:
            name: rhel-webserver   # Will create/manage the PVC
          name: rootdisk
        - cloudInitNoCloud:
            userData: |-
              #cloud-config
              user: cloud-user
              password: redhat
              chpasswd: { expire: False }
              write_files:
                - path: /etc/systemd/system/roxagent.service
                  content: |
                    [Unit]
                    Description=RHACS roxagent for VM vulnerability scanning
                    After=network-online.target
                    Wants=network-online.target
                    [Service]
                    Type=simple
                    ExecStart=/usr/local/bin/roxagent --daemon
                    Restart=always
                    RestartSec=10
                    [Install]
                    WantedBy=multi-user.target
                  permissions: '0644'
                  owner: root:root
              runcmd:
                - sudo subscription-manager register --username=$SUBSCRIPTION_USERNAME --password="$SUBSCRIPTION_PASSWORD"
                - sudo subscription-manager release --set=9.4
                - |
                  sudo subscription-manager repos \
                    --enable=rhel-9-for-x86_64-baseos-eus-rpms \
                    --enable=rhel-9-for-x86_64-appstream-eus-rpms
                - sudo dnf clean all
                - sudo dnf update -y
                - curl -L -f -o /tmp/roxagent https://mirror.openshift.com/pub/rhacs/assets/4.10.0/bin/linux/roxagent
                - chmod +x /tmp/roxagent
                - sudo mv /tmp/roxagent /usr/local/bin/roxagent
                - sudo systemctl daemon-reload
                - sudo systemctl enable roxagent
                - sudo systemctl start roxagent
          name: cloudinitdisk
  dataVolumeTemplates:
    - apiVersion: cdi.kubevirt.io/v1beta1
      kind: DataVolume
      metadata:
        name: rhel-webserver
      spec:
        sourceRef:
          kind: DataSource
          name: rhel9
          namespace: openshift-virtualization-os-images
        storage:
          resources:
            requests:
              storage: 30Gi