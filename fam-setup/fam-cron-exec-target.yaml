# Long-running pod that periodically triggers:
#   - Deploy FAM: oc exec into a privileged workload → touch /etc/passwd
#   - Node FAM:    oc debug node/TARGET_NODE → chroot /host touch /etc/passwd
#
# Implemented as a Deployment with a bash loop (sleep between attempts) so failures are logged
# but the container stays Running — no CrashLoopBackOff when touch is denied (e.g. non-root SCC).
#
# Use this when you want DEPLOYMENT_EVENT-style FAM (e.g. fam-basic-deploy-monitoring)
# on a real app pod.
#
# Before applying:
# 1. Set TARGET_NS on every resource (example: payments).
# 2. Set env TARGET_WORKLOAD / TARGET_NAMESPACE / FAM_LOOP_SLEEP_SEC on the Deployment if needed.
# 3. If the image pull fails, switch `image` to something your cluster can pull, e.g.
#    quay.io/openshift/origin-cli:4.16
#
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rhacs-fam-exec
  namespace: payments
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rhacs-fam-exec-into-workload
  namespace: payments
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rhacs-fam-exec-into-workload
  namespace: payments
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rhacs-fam-exec-into-workload
subjects:
  - kind: ServiceAccount
    name: rhacs-fam-exec
    namespace: payments
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhacs-fam-node-debug
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhacs-fam-node-debug
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rhacs-fam-node-debug
subjects:
  - kind: ServiceAccount
    name: rhacs-fam-exec
    namespace: payments
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rhacs-fam-exec-runner
  namespace: payments
  labels:
    app.kubernetes.io/name: rhacs-fam-exec-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rhacs-fam-exec-runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rhacs-fam-exec-runner
    spec:
      serviceAccountName: rhacs-fam-exec
      containers:
        - name: oc-exec
          image: registry.redhat.io/openshift4/ose-cli-rhel9:v4.16
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -u
              NS="${TARGET_NAMESPACE}"
              WORKLOAD="${TARGET_WORKLOAD}"
              CONTAINER="${TARGET_CONTAINER}"
              NODE="${TARGET_NODE}"
              SLEEP_SEC="${FAM_LOOP_SLEEP_SEC:-600}"
              echo "[$(date -Is)] rhacs-fam-exec-runner starting (sleep ${SLEEP_SEC}s between cycles)"
              while true; do
                # --- Deploy FAM (container) ---
                if oc get "${WORKLOAD}" -n "${NS}" &>/dev/null; then
                  echo "[$(date -Is)] deploy FAM: oc exec -n ${NS} ${WORKLOAD} -c ${CONTAINER} -- touch /etc/passwd"
                  rc=0
                  if [ -n "${CONTAINER}" ]; then
                    oc exec -n "${NS}" "${WORKLOAD}" -c "${CONTAINER}" -- touch /etc/passwd || rc=$?
                  else
                    echo "[$(date -Is)] TARGET_CONTAINER not set — skipping deploy FAM"
                    rc=1
                  fi
                  if [ "${rc}" -eq 0 ]; then
                    echo "[$(date -Is)] deploy FAM touch ok"
                  else
                    echo "[$(date -Is)] deploy FAM touch failed (rc=${rc})"
                  fi
                else
                  echo "[$(date -Is)] workload not found: ${WORKLOAD} in ${NS}"
                fi

                # --- Node FAM (host) — run from install.sh on bastion only; oc debug pods match DEPLOYMENT_EVENT ---
                # Runner intentionally skips automated node trigger to avoid false deploy violations.

                sleep "${SLEEP_SEC}"
              done
          env:
            - name: TARGET_NAMESPACE
              value: "payments"
            - name: TARGET_WORKLOAD
              value: "deployment/visa-processor"
            - name: TARGET_CONTAINER
              value: "visa-processor-sidecar"
            - name: TARGET_NODE
              value: ""
            - name: FAM_LOOP_SLEEP_SEC
              value: "600"
